services:
  api:
    build: .
    container_name: rate-limiter-api
    ports:
      - "3333:3333" # expõe pro k6 do host em localhost:3333
    ulimits:
      nofile:
        soft: 65535 # sobe o limite de file descriptors (fds)
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "1.0" # trava a API em 1 CPU — limite conhecido e reproduzível
          memory: 512M
